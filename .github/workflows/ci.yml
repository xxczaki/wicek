name: CI

on: push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: biomejs/setup-biome@v2
      - run: biome ci ./src

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test]
    permissions:
      contents: read
      packages: write
    name: Build and deploy
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/xxczaki/wicek
          flavor: |
            latest=true
          tags: |
            type=sha,prefix=,format=long
      - name: Build and push
        uses: docker/build-push-action@v7
        id: push
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Checkout charts repo
        uses: actions/checkout@v6
        with:
          repository: xxczaki/charts
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1
          fetch-tags: true
          path: charts-repo
      - name: Update image tag and appVersion
        uses: mikefarah/yq@master
        with:
          cmd: |
            yq -i '.image.tag = "${{ github.sha }}"' 'charts-repo/charts/wicek/values.yaml'
            yq -i '.appVersion = "${{ github.sha }}"' 'charts-repo/charts/wicek/Chart.yaml'
      - name: Get current version
        id: currentVersion
        uses: mikefarah/yq@master
        with:
          cmd: yq '.version' charts-repo/charts/wicek/Chart.yaml
      - name: Get previous tag
        id: previousTag
        run: |
          TAG=$(git -C charts-repo tag --sort=-version:refname | grep '^wicek-' | head -1)
          echo "tag=${TAG:-wicek-${{ steps.currentVersion.outputs.result }}}" >> "$GITHUB_OUTPUT"
      - name: Update chart version
        uses: mikefarah/yq@master
        if: steps.previousTag.outputs.tag == format('wicek-{0}', steps.currentVersion.outputs.result)
        env:
          PREVIOUS_VERSION: ${{ steps.currentVersion.outputs.result }}
        with:
          cmd: NEXT_VERSION=${PREVIOUS_VERSION%.*}.$((${PREVIOUS_VERSION##*.} + 1)) yq -i '.version = strenv(NEXT_VERSION)' 'charts-repo/charts/wicek/Chart.yaml'
      - name: Commit chart update
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update wicek chart"
          repository: charts-repo
